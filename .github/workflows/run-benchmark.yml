name: Fenics and Kratos CI
on:
  push:

  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs the workflow once per day at 3:15am
  schedule:
    - cron: '3 17 * * *'

env:
  EXAMPLE_BENCHMARK_FILE: provenance/benchmark.json
  EXAMPLE_BENCHMARK_ZIP: benchmark/linear-elastic-plate-with-hole.zip

jobs:
  run-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [fenics, kratos]

    steps:
      - name: checkout repo content
        uses: actions/checkout@v6

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v4
        with:
            miniforge-version: latest
            use-mamba: true
            conda-remove-defaults: "true"
        
      - name: Create ${{ matrix.tool }} environment
        run: mamba env create -n ${{ matrix.tool }} -f ${{ matrix.tool }}/environment_benchmark.yml

      - name: Run linear-elastic-plate-with-hole using ${{ matrix.tool }}
        shell: bash -l {0}
        run: |
          cd "$GITHUB_WORKSPACE/${{ matrix.tool }}/"
          conda run -n "${{ matrix.tool }}" python run_benchmark.py \
            --benchmark-file "${GITHUB_WORKSPACE}/${EXAMPLE_BENCHMARK_FILE}" \
            --benchmark-zip "${GITHUB_WORKSPACE}/${EXAMPLE_BENCHMARK_ZIP}" \
            --rocrate-name "${{ matrix.tool }}_rocrate.zip" \
            --result-path "${GITHUB_WORKSPACE}/${{ matrix.tool }}/results" 

      - name: Archive results of the ${{ matrix.tool }} run of linear-elastic-plate-with-hole
        uses: actions/upload-artifact@v6
        with:
            name: ${{ matrix.tool }}_results_linear-elastic-plate-with-hole
            path: |
              ${{ matrix.tool }}/results/

      - name: Archive ${{ matrix.tool }} aggregate RO-Crate artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.tool }}-aggregate-rocrate
          path: ${{ github.workspace }}/${{ matrix.tool }}/results/${{ matrix.tool }}_rocrate.zip

      - name: Install RoHub upload package
        shell: bash -l {0}
        run: |
          python -m pip install rohub

      - name: Upload ${{ matrix.tool }} RO-Crate Zip file onto RoHub
        id: rohub_upload
        shell: bash -l {0}
        continue-on-error: true
        run: |
          TOOL="${{ matrix.tool }}"
          TOOL_NAME="${TOOL^}"
          LOG_FILE="${GITHUB_WORKSPACE}/rohub_upload_${TOOL}_error.log"

          OUTPUT="$(
            python provenance/upload_provenance.py \
              --provenance_folderpath "${GITHUB_WORKSPACE}/${TOOL}/results/${TOOL}_rocrate.zip" \
              --benchmark_name "linear-elastic-plate-with-hole" \
              --username "${{ secrets.ROHUB_USERNAME }}" \
              --password "${{ secrets.ROHUB_PASSWORD }}" \
              --rocrate-title "NFDI4Ing Provenance (${TOOL_NAME})"
            2>&1
          )"

          PYTHON_EXIT_CODE=$?

          if [ "$PYTHON_EXIT_CODE" -eq 0 ]; then
            echo "RoHub upload succeeded"
            rm -f "$LOG_FILE" || true
          else
            echo "=== RoHub upload failed, writing log to $LOG_FILE ==="
            printf '%s\n' "$OUTPUT" | tee "$LOG_FILE"
          fi
  
  process-artifacts:
    runs-on: ubuntu-latest
    needs: run-examples

    strategy:
      fail-fast: false
      matrix:
        tool: [fenics, kratos]

    steps:
      - name: Wait for RoHub processing
        run: sleep 600

      - name: Checkout repo content
        uses: actions/checkout@v6

      - name: Setup Mambaforge with provenance env
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          activate-environment: provenance
          use-mamba: true
          environment-file: provenance/environment_provenance.yml
          conda-remove-defaults: "true"

      - name: Install RoHub query package
        shell: bash -l {0}
        run: |
          python -m pip install rohub

      - name: Run ${{ matrix.tool }} plotting script
        shell: bash -l {0}
        run: |
          python provenance/plot_metrics.py \
            --benchmark-name "linear-elastic-plate-with-hole" \
            --tool "${{ matrix.tool }}" \
            --username "${{ secrets.ROHUB_USERNAME }}" \
            --password "${{ secrets.ROHUB_PASSWORD }}" \
            --output_file "${{ matrix.tool }}-element-size-vs-stress-plot.pdf"

      - name: Upload ${{ matrix.tool }} plot artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.tool }}-element-size-vs-stress-plot
          path: ${{ matrix.tool }}-element-size-vs-stress-plot.pdf
