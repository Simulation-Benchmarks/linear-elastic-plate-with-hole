name: Fenics and Kratos CI
on:
  push:

  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs the workflow once per day at 3:15am
  schedule:
    - cron: '3 16 * * *'

env:
  CACHE_NUMBER: 1  # increase to reset cache manually
  EXAMPLE_BENCHMARK_FILE: provenance/benchmark.json

jobs:
  run-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool_id: fenics
            software_name: Fenics
            environment_name: fenics-model-validation
            environment_file: fenics/environment_benchmark.yml
            results_artifact: fenics_results_linear-elastic-plate-with-hole
            provenance_artifact: fenics_provenance_linear-elastic-plate-with-hole
            provenance_glob: fenics/results/**/Fenics-*.zip

          - tool_id: kratos
            software_name: Kratos
            environment_name: kratos-model-validation
            environment_file: kratos/environment_benchmark.yml
            results_artifact: kratos_results_linear-elastic-plate-with-hole
            provenance_artifact: kratos_provenance_linear-elastic-plate-with-hole
            provenance_glob: kratos/results/**/Kratos-*.zip

    steps:
      - name: checkout repo content
        uses: actions/checkout@v2

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v3
        with:
            miniforge-version: latest
            use-mamba: true
        
      - name: Create ${{ matrix.software_name }} environment
        run: mamba env create -n ${{ matrix.environment_name }} -f ${{ matrix.environment_file }}

      - name: Run linear-elastic-plate-with-hole using ${{ matrix.software_name }}
        shell: bash -l {0}
        run: |
          cd "$GITHUB_WORKSPACE/${{ matrix.tool_id }}/"
          conda run -n "${{ matrix.environment_name }}" python run_benchmark.py

      - name: Archive results of the ${{ matrix.software_name }} run of linear-elastic-plate-with-hole
        uses: actions/upload-artifact@v4
        with:
            name: ${{ matrix.results_artifact }}
            path: |
              ${{ matrix.tool_id }}/results/

      - name: Archive provenance zip artifacts of the ${{ matrix.software_name }} run
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.provenance_artifact }}
          path: |
            ${{ matrix.provenance_glob }}
  
  process-artifacts:
    runs-on: ubuntu-latest
    needs: run-examples

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v2

      - name: Download Fenics results artifact
        uses: actions/download-artifact@v4
        with:
          name: fenics_results_linear-elastic-plate-with-hole
          path: ./simulation-results/fenics

      - name: Download Kratos results artifact
        uses: actions/download-artifact@v4
        with:
          name: kratos_results_linear-elastic-plate-with-hole
          path: ./simulation-results/kratos

      - name: Setup Mambaforge with provenance env
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: provenance
          use-mamba: true
          environment-file: provenance/environment_provenance.yml

      - name: Create Fenics aggregate RO-Crate
        shell: bash -l {0}
        run: |
          python provenance/create_rocrate.py \
            --benchmark-file "${EXAMPLE_BENCHMARK_FILE}" \
            --simulation-result-path "./simulation-results/fenics" \
            --rocrate-filename "Fenics-RoCrate.zip" \
            --software-name "Fenics"

      - name: Unzip Fenics RO-Crate
        run: |
          mkdir -p "./processed/fenics"
          unzip -o "Fenics-RoCrate.zip" -d "./processed/fenics"

      - name: Run Fenics plotting script
        shell: bash -l {0}
        run: |
          python provenance/plot_metrics.py \
            --provenance_folderpath "./processed/fenics" \
            --output_file "fenics-element-size-vs-stress-plot.pdf"

      - name: Upload Fenics plot artifact
        uses: actions/upload-artifact@v4
        with:
          name: fenics-element-size-vs-stress-plot
          path: fenics-element-size-vs-stress-plot.pdf

      - name: Upload Fenics aggregate RO-Crate artifact
        uses: actions/upload-artifact@v4
        with:
          name: fenics-aggregate-rocrate
          path: Fenics-RoCrate.zip

      - name: Upload Fenics RO-Crate Zip file onto RoHub
        id: rohub_upload_fenics
        shell: bash -l {0}
        continue-on-error: true
        run: |
          LOG_FILE="${GITHUB_WORKSPACE}/rohub_upload_fenics_error.log"

          OUTPUT="$(
            python provenance/upload_provenance.py \
              --provenance_folderpath "./Fenics-RoCrate.zip" \
              --benchmark_name "linear-elastic-plate-with-hole" \
              --username "${{ secrets.ROHUB_USERNAME }}" \
              --password "${{ secrets.ROHUB_PASSWORD }}" \
            2>&1
          )"

          PYTHON_EXIT_CODE=$?

          if [ "$PYTHON_EXIT_CODE" -eq 0 ]; then
            echo "RoHub upload succeeded"
            rm -f "$LOG_FILE" || true
          else
            echo "=== RoHub upload failed, writing log to $LOG_FILE ==="
            printf '%s\n' "$OUTPUT" | tee "$LOG_FILE"
          fi

      - name: Upload Fenics RoHub error log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fenics-rohub-upload-error-log
          path: ${{ github.workspace }}/rohub_upload_fenics_error.log
          if-no-files-found: ignore

      - name: Create Kratos aggregate RO-Crate
        shell: bash -l {0}
        run: |
          python provenance/create_rocrate.py \
            --benchmark-file "${EXAMPLE_BENCHMARK_FILE}" \
            --simulation-result-path "./simulation-results/kratos" \
            --rocrate-filename "Kratos-RoCrate.zip" \
            --software-name "Kratos"

      - name: Unzip Kratos RO-Crate
        run: |
          mkdir -p "./processed/kratos"
          unzip -o "Kratos-RoCrate.zip" -d "./processed/kratos"

      - name: Run Kratos plotting script
        shell: bash -l {0}
        run: |
          python provenance/plot_metrics.py \
            --provenance_folderpath "./processed/kratos" \
            --output_file "kratos-element-size-vs-stress-plot.pdf"

      - name: Upload Kratos plot artifact
        uses: actions/upload-artifact@v4
        with:
          name: kratos-element-size-vs-stress-plot
          path: kratos-element-size-vs-stress-plot.pdf

      - name: Upload Kratos aggregate RO-Crate artifact
        uses: actions/upload-artifact@v4
        with:
          name: kratos-aggregate-rocrate
          path: Kratos-RoCrate.zip

      - name: Upload Kratos RO-Crate Zip file onto RoHub
        id: rohub_upload_kratos
        shell: bash -l {0}
        continue-on-error: true
        run: |
          LOG_FILE="${GITHUB_WORKSPACE}/rohub_upload_kratos_error.log"

          OUTPUT="$(
            python provenance/upload_provenance.py \
              --provenance_folderpath "./Kratos-RoCrate.zip" \
              --benchmark_name "linear-elastic-plate-with-hole" \
              --username "${{ secrets.ROHUB_USERNAME }}" \
              --password "${{ secrets.ROHUB_PASSWORD }}" \
            2>&1
          )"

          PYTHON_EXIT_CODE=$?

          if [ "$PYTHON_EXIT_CODE" -eq 0 ]; then
            echo "RoHub upload succeeded"
            rm -f "$LOG_FILE" || true
          else
            echo "=== RoHub upload failed, writing log to $LOG_FILE ==="
            printf '%s\n' "$OUTPUT" | tee "$LOG_FILE"
          fi

      - name: Upload Kratos RoHub error log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kratos-rohub-upload-error-log
          path: ${{ github.workspace }}/rohub_upload_kratos_error.log
          if-no-files-found: ignore
