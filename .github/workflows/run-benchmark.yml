name: Fenics and Kratos CI
on:
  push:

  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs the workflow once per day at 3:15am
  schedule:
    - cron: '3 16 * * *'

env:
  CACHE_NUMBER: 1  # increase to reset cache manually
  EXAMPLE_BENCHMARK_FILE: provenance/benchmark.json

jobs:
  run-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool_id: fenics
            software_name: Fenics
            environment_name: fenics-model-validation
            environment_file: fenics/environment_benchmark.yml
            results_artifact: fenics_results_linear-elastic-plate-with-hole
            provenance_artifact: fenics_provenance_linear-elastic-plate-with-hole
            provenance_glob: fenics/results/**/Fenics-*.zip

          - tool_id: kratos
            software_name: Kratos
            environment_name: kratos-model-validation
            environment_file: kratos/environment_benchmark.yml
            results_artifact: kratos_results_linear-elastic-plate-with-hole
            provenance_artifact: kratos_provenance_linear-elastic-plate-with-hole
            provenance_glob: kratos/results/**/Kratos-*.zip

    steps:
      - name: checkout repo content
        uses: actions/checkout@v6

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v4
        with:
            miniforge-version: latest
            use-mamba: true
            conda-remove-defaults: "true"
        
      - name: Create ${{ matrix.software_name }} environment
        run: mamba env create -n ${{ matrix.environment_name }} -f ${{ matrix.environment_file }}

      - name: Run linear-elastic-plate-with-hole using ${{ matrix.software_name }}
        shell: bash -l {0}
        run: |
          cd "$GITHUB_WORKSPACE/${{ matrix.tool_id }}/"
          conda run -n "${{ matrix.environment_name }}" python run_benchmark.py \
            --benchmark-file "${GITHUB_WORKSPACE}/${EXAMPLE_BENCHMARK_FILE}"

      - name: Archive results of the ${{ matrix.software_name }} run of linear-elastic-plate-with-hole
        uses: actions/upload-artifact@v6
        with:
            name: ${{ matrix.results_artifact }}
            path: |
              ${{ matrix.tool_id }}/results/

      - name: Archive provenance zip artifacts of the ${{ matrix.software_name }} run
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.provenance_artifact }}
          path: |
            ${{ matrix.provenance_glob }}
  
  process-artifacts:
    runs-on: ubuntu-latest
    needs: run-examples

    strategy:
      fail-fast: false
      matrix:
        include:
          - tool_id: fenics
            software_name: Fenics
            results_artifact: fenics_results_linear-elastic-plate-with-hole
            rocrate_filename: Fenics-RoCrate.zip
            plot_filename: fenics-element-size-vs-stress-plot.pdf
            rocrate_title: "NFDI4Ing Provenance (Fenics)"

          - tool_id: kratos
            software_name: Kratos
            results_artifact: kratos_results_linear-elastic-plate-with-hole
            rocrate_filename: Kratos-RoCrate.zip
            plot_filename: kratos-element-size-vs-stress-plot.pdf
            rocrate_title: "NFDI4Ing Provenance (Kratos)"

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v6

      - name: Download ${{ matrix.software_name }} results artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.results_artifact }}
          path: ./simulation-results/${{ matrix.tool_id }}

      - name: Setup Mambaforge with provenance env
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          activate-environment: provenance
          use-mamba: true
          environment-file: provenance/environment_provenance.yml
          conda-remove-defaults: "true"

      - name: Install provenance pip packages
        shell: bash -l {0}
        run: |
          python -m pip install rocrate roc-validator rohub

      - name: Create ${{ matrix.software_name }} aggregate RO-Crate
        shell: bash -l {0}
        run: |
          python provenance/create_rocrate.py \
            --benchmark-file "${EXAMPLE_BENCHMARK_FILE}" \
            --simulation-result-path "./simulation-results/${{ matrix.tool_id }}" \
            --rocrate-filename "${{ matrix.rocrate_filename }}" \
            --software-name "${{ matrix.software_name }}" 

      - name: Unzip ${{ matrix.software_name }} RO-Crate
        run: |
          mkdir -p "./processed/${{ matrix.tool_id }}"
          unzip -o "${{ matrix.rocrate_filename }}" -d "./processed/${{ matrix.tool_id }}"

      - name: Run ${{ matrix.software_name }} plotting script
        shell: bash -l {0}
        run: |
          python provenance/plot_metrics.py \
            --provenance_folderpath "./processed/${{ matrix.tool_id }}" \
            --output_file "${{ matrix.plot_filename }}"

      - name: Upload ${{ matrix.software_name }} plot artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.tool_id }}-element-size-vs-stress-plot
          path: ${{ matrix.plot_filename }}

      - name: Upload ${{ matrix.software_name }} aggregate RO-Crate artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.tool_id }}-aggregate-rocrate
          path: ${{ matrix.rocrate_filename }}

      - name: Upload ${{ matrix.software_name }} RO-Crate Zip file onto RoHub
        id: rohub_upload
        shell: bash -l {0}
        continue-on-error: true
        run: |
          LOG_FILE="${GITHUB_WORKSPACE}/rohub_upload_${{ matrix.tool_id }}_error.log"

          OUTPUT="$(
            python provenance/upload_provenance.py \
              --provenance_folderpath "./${{ matrix.rocrate_filename }}" \
              --benchmark_name "linear-elastic-plate-with-hole" \
              --username "${{ secrets.ROHUB_USERNAME }}" \
              --password "${{ secrets.ROHUB_PASSWORD }}" \
              --rocrate-title "${{ matrix.rocrate_title }}"
            2>&1
          )"

          PYTHON_EXIT_CODE=$?

          if [ "$PYTHON_EXIT_CODE" -eq 0 ]; then
            echo "RoHub upload succeeded"
            rm -f "$LOG_FILE" || true
          else
            echo "=== RoHub upload failed, writing log to $LOG_FILE ==="
            printf '%s\n' "$OUTPUT" | tee "$LOG_FILE"
          fi

      - name: Upload ${{ matrix.software_name }} RoHub error log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.tool_id }}-rohub-upload-error-log
          path: ${{ github.workspace }}/rohub_upload_${{ matrix.tool_id }}_error.log
          if-no-files-found: ignore
