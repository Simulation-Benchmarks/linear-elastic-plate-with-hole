name: Fenics and Kratos CI
on:
  push:

  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs the workflow once per day at 3:15am
  schedule:
    - cron: '3 16 * * *'

env:
  CACHE_NUMBER: 1  # increase to reset cache manually
  EXAMPLE_BENCHMARK_FILE: provenance/benchmark.json

jobs:
  run-examples:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo content
        uses: actions/checkout@v2

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v3
        with:
            miniforge-version: latest
            use-mamba: true
        
      - name: Create fenics environment
        run: mamba env create -n fenics-model-validation -f fenics/environment_benchmark.yml

      - name: Run linear-elastic-plate-with-hole using fenics
        shell: bash -l {0}
        run: |
          cd $GITHUB_WORKSPACE/fenics/
          conda run -n fenics-model-validation python run_benchmark.py

      - name: Create kratos environment
        run: mamba env create -n kratos-model-validation -f kratos/environment_benchmark.yml

      - name: Run linear-elastic-plate-with-hole using kratos
        shell: bash -l {0}
        run: |
          cd $GITHUB_WORKSPACE/kratos/
          conda run -n kratos-model-validation python run_benchmark.py

      - name: Archive results of the fenics run of linear-elastic-plate-with-hole
        uses: actions/upload-artifact@v4
        with:
            name: fenics_results_linear-elastic-plate-with-hole
            path: |
              fenics/results/

      - name: Archive results of the kratos run of linear-elastic-plate-with-hole
        uses: actions/upload-artifact@v4
        with:
            name: kratos_results_linear-elastic-plate-with-hole
            path: |
              kratos/results/
      
      - name: Archive provenance zip artifacts of the Fenics run
        uses: actions/upload-artifact@v4
        with:
          name: fenics_provenance_linear-elastic-plate-with-hole
          path: |
            fenics/results/**/Fenics-*.zip
      
      - name: Archive provenance zip artifacts of the Kratos run
        uses: actions/upload-artifact@v4
        with:
          name: kratos_provenance_linear-elastic-plate-with-hole
          path: |
            kratos/results/**/Kratos-*.zip 
  
  process-artifacts:
    runs-on: ubuntu-latest
    needs: run-examples

    strategy:
      fail-fast: false
      matrix:
        include:
          - tool_slug: fenics
            software_name: Fenics
            results_artifact: fenics_results_linear-elastic-plate-with-hole
            rocrate_filename: Fenics-RoCrate.zip
            plot_filename: fenics-element-size-vs-stress-plot.pdf

          - tool_slug: kratos
            software_name: Kratos
            results_artifact: kratos_results_linear-elastic-plate-with-hole
            rocrate_filename: Kratos-RoCrate.zip
            plot_filename: kratos-element-size-vs-stress-plot.pdf

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v2

      - name: Download ${{ matrix.software_name }} results artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.results_artifact }}
          path: ./simulation-results/${{ matrix.tool_slug }}

      - name: Setup Mambaforge with provenance env
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: provenance
          use-mamba: true
          environment-file: provenance/environment_provenance.yml

      - name: Create ${{ matrix.software_name }} aggregate RO-Crate
        shell: bash -l {0}
        run: |
          python provenance/create_rocrate.py \
            --benchmark-file "${EXAMPLE_BENCHMARK_FILE}" \
            --simulation-result-path "./simulation-results/${{ matrix.tool_slug }}" \
            --rocrate-filename "${{ matrix.rocrate_filename }}" \
            --software-name "${{ matrix.software_name }}"

      - name: Unzip ${{ matrix.software_name }} RO-Crate
        run: |
          mkdir -p "./processed/${{ matrix.tool_slug }}"
          unzip -o "${{ matrix.rocrate_filename }}" -d "./processed/${{ matrix.tool_slug }}"

      - name: Run ${{ matrix.software_name }} plotting script
        shell: bash -l {0}
        run: |
          python provenance/plot_metrics.py \
            --provenance_folderpath "./processed/${{ matrix.tool_slug }}" \
            --output_file "${{ matrix.plot_filename }}"

      - name: Upload ${{ matrix.software_name }} plot artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool_slug }}-element-size-vs-stress-plot
          path: ${{ matrix.plot_filename }}

      - name: Upload ${{ matrix.software_name }} aggregate RO-Crate artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool_slug }}-aggregate-rocrate
          path: ${{ matrix.rocrate_filename }}

      - name: Upload ${{ matrix.software_name }} RO-Crate Zip file onto RoHub
        id: rohub_upload
        shell: bash -l {0}
        continue-on-error: true
        run: |
          LOG_FILE="${GITHUB_WORKSPACE}/rohub_upload_${{ matrix.tool_slug }}_error.log"

          OUTPUT="$(
            python provenance/upload_provenance.py \
              --provenance_folderpath "./${{ matrix.rocrate_filename }}" \
              --benchmark_name "linear-elastic-plate-with-hole" \
              --username "${{ secrets.ROHUB_USERNAME }}" \
              --password "${{ secrets.ROHUB_PASSWORD }}" \
            2>&1
          )"

          PYTHON_EXIT_CODE=$?

          if [ "$PYTHON_EXIT_CODE" -eq 0 ]; then
            echo "RoHub upload succeeded"
            rm -f "$LOG_FILE" || true
          else
            echo "=== RoHub upload failed, writing log to $LOG_FILE ==="
            printf '%s\n' "$OUTPUT" | tee "$LOG_FILE"
          fi

      - name: Upload ${{ matrix.software_name }} RoHub error log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool_slug }}-rohub-upload-error-log
          path: ${{ github.workspace }}/rohub_upload_${{ matrix.tool_slug }}_error.log
          if-no-files-found: ignore