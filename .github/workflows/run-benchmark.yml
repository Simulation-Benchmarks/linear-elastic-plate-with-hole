name: Fenics and Kratos CI
on:
  push:

  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs the workflow once per day at 3:15am
  schedule:
    - cron: '3 17 * * *'

env:
  BENCHMARK_ROHUB_IDENTIFIER: 68b027dd-666b-4b32-a416-952960022c2c
  BENCHMARK_VERSION: 1.0.0
  EXAMPLE_BENCHMARK_FILE: downloaded-benchmark/benchmark.json
  EXAMPLE_BENCHMARK_ZIP: downloaded-benchmark/linear-elastic-plate-with-hole.zip
  BRANCH_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  USE_PRODUCTION_ROHUB: true 

jobs:
  run-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [fenics, kratos]

    steps:
      - name: checkout repo content
        uses: actions/checkout@v6

      - name: Setup Mambaforge
        uses: conda-incubator/setup-miniconda@v4
        with:
            miniforge-version: latest
            use-mamba: true
            conda-remove-defaults: "true"
        
      - name: Create ${{ matrix.tool }} environment
        run: mamba env create -n ${{ matrix.tool }} -f ${{ matrix.tool }}/environment_benchmark.yml

      - name: Install RoHub package
        shell: bash -l {0}
        run: |
          python -m pip install rohub

      - name: Download benchmark resources from RoHub
        shell: bash -l {0}
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/downloaded-benchmark"

          python provenance/download_benchmark.py \
            --identifier "${BENCHMARK_ROHUB_IDENTIFIER}" \
            --username "${{ secrets.ROHUB_PROD_USERNAME }}" \
            --password "${{ secrets.ROHUB_PROD_PASSWORD }}" \
            --zip-resource-filename "${GITHUB_WORKSPACE}/${EXAMPLE_BENCHMARK_ZIP}" \
            --semantic-resource-filename "${GITHUB_WORKSPACE}/${EXAMPLE_BENCHMARK_FILE}" \
            --use-production-rohub True

      - name: Run linear-elastic-plate-with-hole using ${{ matrix.tool }}
        shell: bash -l {0}
        run: |
          cd "$GITHUB_WORKSPACE/${{ matrix.tool }}/"
          conda run -n "${{ matrix.tool }}" python run_benchmark.py \
            --benchmark-file "${GITHUB_WORKSPACE}/${EXAMPLE_BENCHMARK_FILE}" \
            --benchmark-zip "${GITHUB_WORKSPACE}/${EXAMPLE_BENCHMARK_ZIP}" \
            --rocrate-name "${{ matrix.tool }}_rocrate.zip" \
            --result-path "${GITHUB_WORKSPACE}/${{ matrix.tool }}/results" 

      - name: Archive results of the ${{ matrix.tool }} run of linear-elastic-plate-with-hole
        uses: actions/upload-artifact@v6
        with:
            name: ${{ matrix.tool }}_results_linear-elastic-plate-with-hole
            path: |
              ${{ matrix.tool }}/results/

      - name: Archive ${{ matrix.tool }} aggregate RO-Crate artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.tool }}-aggregate-rocrate
          path: ${{ github.workspace }}/${{ matrix.tool }}/results/${{ matrix.tool }}_rocrate.zip

      - name: Upload ${{ matrix.tool }} RO-Crate Zip file onto RoHub
        id: rohub_upload
        shell: bash -l {0}
        continue-on-error: true
        run: |
          TOOL="${{ matrix.tool }}"
          TOOL_NAME="${TOOL^}"
          ROCRATE_TITLE="NFDI4Ing Provenance (${TOOL_NAME}) ${BENCHMARK_VERSION}"

          if [ "${USE_PRODUCTION_ROHUB}" = "true" ]; then
            ROHUB_USERNAME="${{ secrets.ROHUB_PROD_USERNAME }}"
            ROHUB_PASSWORD="${{ secrets.ROHUB_PROD_PASSWORD }}"
          else
            ROHUB_USERNAME="${{ secrets.ROHUB_DEV_USERNAME }}"
            ROHUB_PASSWORD="${{ secrets.ROHUB_DEV_PASSWORD }}"
            ROCRATE_TITLE="${ROCRATE_TITLE}_${BRANCH_COMMIT_SHA:0:7}"
          fi

          python provenance/upload_provenance.py \
            --provenance_folderpath "${GITHUB_WORKSPACE}/${TOOL}/results/${TOOL}_rocrate.zip" \
            --benchmark_name "linear-elastic-plate-with-hole" \
            --username "${ROHUB_USERNAME}" \
            --password "${ROHUB_PASSWORD}" \
            --rocrate-title "${ROCRATE_TITLE}" \
            --use-production-rohub "${USE_PRODUCTION_ROHUB}"
  
  wait-for-rohub-processing:
    runs-on: ubuntu-latest
    needs: run-examples
    steps:
      - name: Wait for RoHub processing
        run: sleep 600

  process-artifacts:
    runs-on: ubuntu-latest
    needs: wait-for-rohub-processing
    env:
      PLOT_OUTPUT_FILE: ${{ matrix.tool }}-element-size-vs-stress-plot.pdf

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        tool: [fenics, kratos]

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v6

      - name: Setup Mambaforge with provenance env
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
          activate-environment: provenance
          use-mamba: true
          environment-file: provenance/environment_provenance.yml
          conda-remove-defaults: "true"

      - name: Run ${{ matrix.tool }} plotting script
        shell: bash -l {0}
        run: |
          python provenance/plot_plate_with_hole_metrics.py \
            --tool "${{ matrix.tool }}" \
            --output-file "${PLOT_OUTPUT_FILE}" \
            --use-production-rohub "${USE_PRODUCTION_ROHUB}"

      - name: Upload ${{ matrix.tool }} plot artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.tool }}-plot
          path: ${{ env.PLOT_OUTPUT_FILE }}
